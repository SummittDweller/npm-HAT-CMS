{{ define "title" }}
    {{ .Title }} &ndash; {{ .Site.Title }}
{{ end }}

{{ define "main" }}
  {{ `<!-- ENTER: layouts/event/single.html -->` | safeHTML }}

    <div class="container mt-3 mb-3">
      {{- partial "content.html" . -}}

      {{ if .Params.eventDetailsPdf }}
        <div class="card mt-3">
          <div class="card-body">
            <h3 class="card-title">Event Details</h3>
            <embed width="100%" height="1000" src="{{ .Params.eventDetailsPdf }}"></embed>
          </div>
        </div>
      {{ end }}
    </div>

  {{ `<!-- EXIT: layouts/event/single.html -->` | safeHTML }}
{{ end }}
